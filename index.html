<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 47 | Private Hub</title>
    <style>
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .container { border: 1px solid #333; padding: 20px; display: inline-block; border-radius: 10px; background: #111; box-shadow: 0 0 15px #ff000033; }
        h1 { color: #ff0000; letter-spacing: 7px; text-transform: uppercase; margin-bottom: 5px; }
        .id-card { font-size: 0.8em; color: #888; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        audio { filter: invert(100%); width: 280px; margin-top: 20px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 2% { color: #fff; } 4% { color: #ff0000; } 6% { color: #fff; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">Agent 47</h1>
        <div class="id-card">CLASSIFIED | OPERATIVE HUB</div>
        <p>Greetings. Welcome to the specialized operative hub.</p>
        <audio controls autoplay>
            <source src="voice.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
