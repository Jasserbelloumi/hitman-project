name: Hitman Auto Deploy
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          vercel-org-id: "team_jasser" # جرب تركها هكذا أو استبدالها بيوزرك
          vercel-project-id: "hitman-project"
          working-directory: ./
